name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: barradatijucapsi.com.br
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/prod/barradatijucapsi/barradatijucapsi

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: barradatijucapsi.com.br
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/public/*"
          target: "/var/www/prod/barradatijucapsi/barradatijucapsi"
          strip_components: 2
